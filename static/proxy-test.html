<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MDM Proxy Status</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; background: #f5f5f5;
}
.card {
  background: #fff; border-radius: 12px; padding: 3rem 4rem;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center;
  max-width: 480px; width: 90%;
}
.status-icon { font-size: 4rem; margin-bottom: 1rem; }
.status-text { font-size: 1.5rem; font-weight: 600; margin-bottom: 1.5rem; }
.detail { font-size: 0.9rem; color: #666; margin: 0.4rem 0; }
.detail code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 0.85rem; }
.active .status-text { color: #1a7f37; }
.inactive .status-text { color: #cf222e; }
.checking .status-text { color: #666; }
.error .status-text { color: #9a6700; }
.refresh { margin-top: 1.5rem; font-size: 0.8rem; color: #999; }
</style>
</head>
<body>
<div class="card checking" id="card">
  <div class="status-icon" id="icon">&#x23F3;</div>
  <div class="status-text" id="status">Checking proxy status&hellip;</div>
  <div class="detail" id="detected"></div>
  <div class="detail" id="expected"></div>
  <div class="refresh" id="refresh"></div>
</div>
<script>
(function() {
  var EXPECTED_IP = "23.236.58.120";
  var card = document.getElementById("card");
  var icon = document.getElementById("icon");
  var statusEl = document.getElementById("status");
  var detected = document.getElementById("detected");
  var expected = document.getElementById("expected");
  var refresh = document.getElementById("refresh");

  function check() {
    card.className = "card checking";
    icon.textContent = "\u23F3";
    statusEl.textContent = "Checking proxy status\u2026";
    detected.textContent = "";
    expected.textContent = "";

    fetch("https://api.ipify.org?format=json")
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var ip = data.ip;
        var isActive = (ip === EXPECTED_IP);
        card.className = "card " + (isActive ? "active" : "inactive");
        icon.textContent = isActive ? "\u2705" : "\u274c";
        statusEl.textContent = isActive ? "Proxy is active" : "Proxy is inactive";
        detected.innerHTML = "Your IP: <code>" + escapeHtml(ip) + "</code>";
        expected.innerHTML = "Expected: <code>" + EXPECTED_IP + "</code>";
        refresh.textContent = "Last checked: " + new Date().toLocaleTimeString();
      })
      .catch(function(err) {
        card.className = "card error";
        icon.textContent = "\u26a0\ufe0f";
        statusEl.textContent = "Unable to check";
        detected.textContent = "Could not reach api.ipify.org \u2014 check network connection.";
        expected.textContent = "";
        refresh.textContent = "Last attempt: " + new Date().toLocaleTimeString();
      });
  }

  function escapeHtml(s) {
    var d = document.createElement("div");
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
  }

  check();
  setInterval(check, 60000);
})();
</script>
</body>
</html>
